<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!--
    NookDB profile icon. 1024x1024 square.
    Drop-in for GitHub org avatars, Instagram/X profile photos, or anywhere
    a square brand mark is needed.

    Composition:
    - #0B0A09 matte black background (matches the site bg palette token)
    - Cream #F2EFEA NookDB mark centred at ~60% of canvas
    - ~205px padding per side, inside the circle-crop safe zone that
      GitHub / Instagram / X impose for round avatars

    Geometry is the og-image icon group, transformed to fit.
  -->

  <rect width="1024" height="1024" fill="#0B0A09" />

  <g transform="translate(205 205) scale(12.79)" fill="none" stroke="#F2EFEA"
     stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M10 10 L10 38" />
    <path d="M10 17 C10 11 20 10 26 16 L26 28 C26 33 30 34 34 34" />
    <path d="M34 34 L34 38" />
    <line x1="18" y1="24" x2="29" y2="24" stroke-width="2.5" />
    <line x1="18" y1="29" x2="27" y2="29" stroke-width="2.5" />
    <line x1="18" y1="34" x2="25" y2="34" stroke-width="2.5" opacity="0.6" />
  </g>
</svg>
